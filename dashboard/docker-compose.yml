version: '3.8'

services:
  gravitate-health-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: gravitate-health-backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    volumes:
    - ./backend/gravitate-service-account.json:/gravitate-service-account.json

  gravitate-health-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: gravitate-health-frontend
    ports:
      - "3000:80"
    env_file:
      - ./frontend/.env
    depends_on:
      - gravitate-health-backend
